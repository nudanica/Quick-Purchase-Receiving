.buyrow{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;

.buyrow .who{color:var(--ink2);font-size:11px}
.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:22px;font-weight:800;letter-spacing:.18em;

.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));

#stage{position:fixed;left:-99999px;top:0;width:794px}

.ph{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #000;padding-bottom:8px}
.ph .t{font-size:22px;font-weight:800}

.pt .nm{font-size:13px;font-weight:700;line-height:1.3}

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* =========================================================
   SURU Quick Purchase List v2
   บันทึกลงเครื่องก่อนเสมอ แล้วซิงก์ขึ้นเซิร์ฟเวอร์เป็นเบื้องหลัง
   ========================================================= */

const CURRENCIES = [
  {code:'JPY', sym:'¥', rate:0.23}, {code:'KRW', sym:'₩', rate:0.026},
  {code:'CNY', sym:'¥', rate:5.0},  {code:'USD', sym:'$', rate:36.0},
  {code:'EUR', sym:'€', rate:39.0}, {code:'THB', sym:'฿', rate:1}
];
const uid  = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const now  = () => Date.now();
const esc  = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt  = n => (Math.round(n*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});

let DB = {
  v:2, device:'', deviceName:'', server:'', token:'',
  trips:[], groups:[], entries:[], sync:{},
  activeTrip:null, autoShot:true, useAI:true
};
let PCACHE = {};        // id -> dataURL รูปเต็ม (โหลดตามต้องการ)
let tab='add', draft=null, memOnly=false, BACKEND='memory';
let syncing=false, lastSyncOk=0;

/* ---------- storage ---------- */
const IDB = (()=>{
  let p=null;
  const open = () => p || (p = new Promise((ok,no)=>{
    const r = indexedDB.open('suru-quick-purchase', 2);
    r.onupgradeneeded = () => { if(!r.result.objectStoreNames.contains('kv')) r.result.createObjectStore('kv'); };
    r.onsuccess = () => ok(r.result); r.onerror = () => no(r.error);
  }));
  const run = (mode,fn) => open().then(db => new Promise((ok,no)=>{
    const q = fn(db.transaction('kv',mode).objectStore('kv'));
    q.onsuccess=()=>ok(q.result); q.onerror=()=>no(q.error);
  }));
  return { get:k=>run('readonly',s=>s.get(k)), set:(k,v)=>run('readwrite',s=>s.put(v,k)),
           del:k=>run('readwrite',s=>s.delete(k)) };
})();
const S = {
  async get(k){ try{
    if(BACKEND==='claude'){ const r=await window.storage.get(k); return r?JSON.parse(r.value):null; }
    if(BACKEND==='idb'){ const v=await IDB.get(k); return v===undefined?null:v; }
  }catch(e){} return null; },
  async set(k,v){ try{
    if(BACKEND==='claude'){ await window.storage.set(k,JSON.stringify(v)); return true; }
    if(BACKEND==='idb'){ await IDB.set(k,v); return true; }
  }catch(e){ memOnly=true; } return false; },
  async del(k){ try{ if(BACKEND==='idb') await IDB.del(k); }catch(e){} }
};
const saveMeta = () => S.set('suru:meta', DB);
const putPhoto = (id,d) => { PCACHE[id]=d; return S.set('suru:photo:'+id, d); };
async function getPhoto(id){
  if(PCACHE[id]) return PCACHE[id];
  const v = await S.get('suru:photo:'+id);
  if(v){ PCACHE[id]=v; return v; }
  return null;
}

/* ---------- helpers ---------- */
const trip    = () => DB.trips.find(t=>t.id===DB.activeTrip && !t.deleted) || null;
const cur     = () => CURRENCIES.find(c=>c.code===(trip()||{}).currency) || CURRENCIES[0];
const money   = n => cur().sym + fmt(n);
const thb     = n => '฿' + fmt(n * (trip()?.rate ?? cur().rate));
const live    = a => a.filter(x=>!x.deleted);
const tEntries= () => live(DB.entries).filter(e=>e.tripId===DB.activeTrip);
const tGroups = () => live(DB.groups).filter(g=>g.tripId===DB.activeTrip);
const gEntries= gid => live(DB.entries).filter(e=>e.groupId===gid);
const touch   = r => { r.updated = now(); r.dirty = 1; return r; };

function groupName(g){
  if(g.name) return g.name;
  const e = gEntries(g.id).find(x=>x.ai && x.ai.display);
  return e ? e.ai.display : '';
}
function groupSub(g){
  const e = gEntries(g.id).find(x=>x.ai && (x.ai.name_ja||x.ai.size));
  return e ? [e.ai.name_ja, e.ai.size].filter(Boolean).join(' · ') : '';
}
function groupStats(g){
  const es = gEntries(g.id);
  const qty = es.reduce((a,e)=>a+e.qty,0);
  const sum = es.reduce((a,e)=>a+e.total,0);
  return { qty, sum, avg: qty?sum/qty:0, buys: es.length, es };
}
const thumbOf = g => (gEntries(g.id)[0]||{}).thumb || '';
function toast(m){
  const d=document.createElement('div'); d.className='toast'; d.textContent=m;
  document.body.appendChild(d); setTimeout(()=>d.remove(),2200);
}

/* ---------- boot ---------- */
async function boot(){
  if(window.storage) BACKEND='claude';
  else if(window.indexedDB){ try{ await IDB.get('probe'); BACKEND='idb'; }catch(e){ BACKEND='memory'; } }
  memOnly = BACKEND==='memory';
  try{ if(navigator.storage?.persist) await navigator.storage.persist(); }catch(e){}

  if(!memOnly){ const m = await S.get('suru:meta'); if(m) DB = Object.assign(DB, m); }
  if(!DB.device){ DB.device = uid('dv_'); DB.deviceName = 'เครื่อง ' + DB.device.slice(-4); await saveMeta(); }
  render();
  if(memOnly) toast('เบราว์เซอร์นี้เก็บข้อมูลถาวรไม่ได้ ข้อมูลจะหายเมื่อปิดแท็บ');
  queueAI();
  syncNow(true);
  setInterval(()=>{ if(document.visibilityState==='visible') syncNow(true); }, 15000);
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') syncNow(true); });
  window.addEventListener('online', ()=>syncNow(true));
}

/* =========================================================
   SYNC — เก็บลงเครื่องก่อน แล้วค่อยส่งขึ้นเซิร์ฟเวอร์
   ========================================================= */
async function api(path, body){
  if(!DB.server) throw new Error('ยังไม่ได้ตั้งค่าเซิร์ฟเวอร์');
  const r = await fetch(DB.server + path, {
    method:'POST',
    headers:{'Content-Type':'application/json', 'X-App-Token': DB.token || ''},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('เซิร์ฟเวอร์ตอบ ' + r.status);
  return r.json();
}
const wire = (kind, r) => ({
  id:r.id, kind, trip: kind==='trip'? r.id : r.tripId,
  updated:r.updated||0, deleted:r.deleted?1:0,
  data: JSON.stringify(r)
});
function dirtyRecords(tid){
  const out=[];
  DB.trips.filter(t=>t.id===tid && t.dirty).forEach(t=>out.push(wire('trip',t)));
  DB.groups.filter(g=>g.tripId===tid && g.dirty).forEach(g=>out.push(wire('group',g)));
  DB.entries.filter(e=>e.tripId===tid && e.dirty).forEach(e=>out.push(wire('entry',e)));
  return out;
}
function applyRemote(rec){
  const list = rec.kind==='trip'? DB.trips : rec.kind==='group'? DB.groups : DB.entries;
  const inc = JSON.parse(rec.data);
  inc.updated = rec.updated; inc.deleted = rec.deleted; delete inc.dirty;
  const i = list.findIndex(x=>x.id===inc.id);
  if(i<0){ list.push(inc); return; }
  if((list[i].updated||0) < rec.updated) list[i] = inc;
}
function setDot(){
  const d = document.getElementById('syncDot'); if(!d) return;
  const pending = DB.server ? dirtyRecords(DB.activeTrip).length : 0;
  d.className = 'dot ' + (!DB.server ? 'off' : pending ? 'wait' : 'on');
}
async function syncNow(silent){
  if(syncing || !DB.server || !DB.activeTrip) { setDot(); return; }
  syncing = true;
  try{
    const tid = DB.activeTrip;
    const changes = dirtyRecords(tid);
    const res = await api('/sync', { trip:tid, since: DB.sync[tid]||0, changes });
    (res.records||[]).forEach(applyRemote);
    changes.forEach(c=>{
      const l = [...DB.trips,...DB.groups,...DB.entries].find(x=>x.id===c.id);
      if(l && l.updated <= c.updated) delete l.dirty;
    });
    DB.sync[tid] = res.now;
    lastSyncOk = now();
    await saveMeta();
    render();
    pushPhotos();
    if(!silent) toast('ซิงก์แล้ว');
  }catch(e){
    if(!silent) toast('ซิงก์ไม่สำเร็จ: ' + e.message);
  }finally{ syncing=false; setDot(); }
}
async function pushPhotos(){
  if(!DB.server) return;
  const pend = DB.entries.filter(e=>e.tripId===DB.activeTrip && !e.deleted && !e.photoUp).slice(0,3);
  for(const e of pend){
    const data = await getPhoto(e.id);
    if(!data){ e.photoUp = 1; continue; }
    try{ await api('/photo/put', {trip:e.tripId, id:e.id, data}); e.photoUp = 1; }
    catch(err){ break; }
  }
  await saveMeta();
}
async function pullPhotos(ids){
  const missing = [];
  for(const id of ids){ if(!(await getPhoto(id))) missing.push(id); }
  if(!missing.length || !DB.server) return missing.length;
  for(let i=0;i<missing.length;i+=4){
    try{
      const res = await api('/photo/get', {ids: missing.slice(i,i+4)});
      for(const [id,data] of Object.entries(res.photos||{})) await putPhoto(id, data);
    }catch(e){ break; }
  }
  let still=0; for(const id of missing) if(!(await getPhoto(id))) still++;
  return still;
}

/* ---------- image ---------- */
const loadImg = src => new Promise((ok,no)=>{ const i=new Image(); i.onload=()=>ok(i); i.onerror=no; i.src=src; });
async function processPhoto(file){
  const url = URL.createObjectURL(file);
  const img = await loadImg(url);
  const draw = (max,q)=>{
    const s = Math.min(1, max/Math.max(img.width,img.height));
    const c = document.createElement('canvas');
    c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    return c.toDataURL('image/jpeg',q);
  };
  const full = draw(1000,.72), thumb = draw(150,.55);
  const c = document.createElement('canvas'); c.width=c.height=8;
  const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,8,8);
  const d=ctx.getImageData(0,0,8,8).data, g=[];
  for(let i=0;i<64;i++) g.push(.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2]);
  const avg=g.reduce((a,b)=>a+b,0)/64;
  const hash=g.map(v=>v>avg?'1':'0').join('');
  URL.revokeObjectURL(url);
  let barcode='';
  try{ if('BarcodeDetector' in window){ const res = await new BarcodeDetector().detect(await loadImg(full));
    if(res && res[0]) barcode = res[0].rawValue||''; } }catch(e){}
  return {full, thumb, hash, barcode};
}
const hamming=(a,b)=>{ if(!a||!b||a.length!==b.length) return 64; let n=0; for(let i=0;i<a.length;i++) if(a[i]!==b[i])n++; return n; };

/* ---------- AI ---------- */
let aiBusy=false;
function queueAI(){
  if(aiBusy || !DB.useAI) return;
  const e = live(DB.entries).find(x=>!x.ai || x.ai.status==='queued');
  if(e){ aiBusy=true; runAI(e).finally(()=>{ aiBusy=false; setTimeout(queueAI,250); }); }
}
async function runAI(entry){
  const photo = await getPhoto(entry.id);
  if(!photo){ entry.ai={status:'error'}; return; }
  entry.ai = Object.assign({}, entry.ai, {status:'running'});
  const prompt =
`You are reading a product package photo taken in a shop abroad. Read ALL visible text (Japanese, Korean, Chinese, English).
Return ONLY a JSON object, no markdown, no commentary:
{"brand":"","name_en":"","name_ja":"","variant":"","size":"","barcode":"","display":"","confidence":0.0}
- "variant" = flavour / scent / formula / colour if printed.
- "size" = net weight or volume with unit, e.g. "200ml", "12 pcs".
- "barcode" = digits only if a barcode number is legible, else "".
- "display" = one short shopping-list label: brand + product + variant + size. Latin script preferred; keep the Japanese name only if there is no readable Latin name.
- "confidence" = 0 to 1.
If the package is unreadable, return every field empty and confidence 0.`;
  try{
    const viaServer = !!DB.server;
    const url = viaServer ? DB.server + '/ai' : 'https://api.anthropic.com/v1/messages';
    const headers = {'Content-Type':'application/json'};
    if(viaServer) headers['X-App-Token'] = DB.token || '';
    const r = await fetch(url,{ method:'POST', headers, body: JSON.stringify({
      model: viaServer ? 'claude-sonnet-5' : 'claude-sonnet-4-6', max_tokens:1000,
      messages:[{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:'image/jpeg', data: photo.split(',')[1]}},
        {type:'text', text: prompt}
      ]}]
    })});
    const data = await r.json();
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').replace(/```json|```/g,'').trim();
    const j = JSON.parse(txt.slice(txt.indexOf('{'), txt.lastIndexOf('}')+1));
    entry.ai = { status:'done', brand:j.brand||'', name_en:j.name_en||'', name_ja:j.name_ja||'',
      variant:j.variant||'', size:j.size||'', barcode: entry.ai?.barcode || j.barcode || '',
      display:(j.display||[j.brand,j.name_en,j.variant,j.size].filter(Boolean).join(' ')).trim(),
      confidence:Number(j.confidence)||0 };
    touch(entry);
  }catch(err){ entry.ai = Object.assign({}, entry.ai, {status:'error'}); }
  await saveMeta();
  if(tab!=='add') render();
  syncNow(true);
}

/* ---------- แนะนำสินค้าซ้ำ ---------- */
const norm = s => String(s||'').toLowerCase().replace(/[^\p{L}\p{N}]+/gu,' ').trim();
function nameSim(a,b){
  a=norm(a); b=norm(b);
  if(!a||!b) return 0; if(a===b) return 1;
  const A=new Set(a.split(' ').filter(w=>w.length>1)), B=new Set(b.split(' ').filter(w=>w.length>1));
  if(!A.size||!B.size) return 0;
  let hit=0; A.forEach(w=>{ if(B.has(w)) hit++; });
  return hit/Math.min(A.size,B.size);
}
function pairScore(g1,g2){
  const e1=gEntries(g1.id), e2=gEntries(g2.id);
  const b1=e1.map(e=>e.ai?.barcode).filter(Boolean), b2=e2.map(e=>e.ai?.barcode).filter(Boolean);
  if(b1.some(b=>b2.includes(b))) return {score:.99, why:'บาร์โค้ดตรงกัน'};
  let img=0; e1.forEach(a=>e2.forEach(b=>{ img=Math.max(img,1-hamming(a.hash,b.hash)/64); }));
  const nm = nameSim(groupName(g1), groupName(g2));
  return { score: Math.max(nm*.65+img*.35, img>=.92?.8:0),
           why: nm>.6?'ชื่อสินค้าใกล้เคียง' : img>=.9?'รูปสินค้าคล้ายกันมาก' : 'ชื่อและรูปใกล้เคียง' };
}
function suggestions(){
  const gs=tGroups(), out=[];
  for(let i=0;i<gs.length;i++) for(let j=i+1;j<gs.length;j++){
    const a=gs[i], b=gs[j];
    if((a.skip||[]).includes(b.id)||(b.skip||[]).includes(a.id)) continue;
    const {score,why}=pairScore(a,b);
    if(score>=.62) out.push({a,b,score,why});
  }
  return out.sort((x,y)=>y.score-x.score).slice(0,4);
}

async function deleteEntry(id){
  const e = DB.entries.find(x=>x.id===id); if(!e) return;
  e.deleted=1; touch(e);
  const g = DB.groups.find(x=>x.id===e.groupId);

  await saveMeta(); render(); syncNow(true); toast('ลบรายการซื้อแล้ว');
}
async function deleteGroup(gid){
  const g = DB.groups.find(x=>x.id===gid); if(!g) return;
  gEntries(gid).forEach(e=>{ e.deleted=1; touch(e); });
  g.deleted=1; touch(g);
  await saveMeta(); closeModal(); render(); syncNow(true); toast('ลบสินค้าแล้ว');
}
async function splitEntry(id){
  const e = DB.entries.find(x=>x.id===id); if(!e) return;
  const g = touch({ id:uid('g_'), tripId:e.tripId, name:'', skip:[] });
  DB.groups.push(g); e.groupId=g.id; touch(e);
  await saveMeta(); closeModal(); render(); syncNow(true); toast('แยกออกเป็นสินค้าใหม่แล้ว');
}
async function mergeGroups(aId,bId){
  const a=DB.groups.find(g=>g.id===aId), b=DB.groups.find(g=>g.id===bId);
  if(!a||!b) return;
  DB.entries.forEach(e=>{ if(e.groupId===b.id){ e.groupId=a.id; touch(e); } });
  if(!a.name && b.name) a.name=b.name;
  b.deleted=1; touch(b); touch(a);
  await saveMeta(); render(); syncNow(true); toast('รวมเป็นรายการเดียวแล้ว');
}
async function skipPair(aId,bId){
  const a=DB.groups.find(g=>g.id===aId);
  a.skip=[...(a.skip||[]), bId]; touch(a);
  await saveMeta(); render(); syncNow(true);
}

  const t = touch({ id: tripCode(name), name, currency, rate, createdAt:new Date().toISOString() });
  DB.trips.push(t); DB.activeTrip=t.id; DB.sync[t.id]=0;
  await saveMeta(); closeModal(); tab='add'; render(); syncNow(true);
  toast('เริ่มทริป ' + name + ' · รหัส ' + t.id);
}
async function joinTrip(){
  const code = document.getElementById('jc').value.trim().toUpperCase();
  if(!code) return;
  if(!DB.server){ toast('ตั้งค่าเซิร์ฟเวอร์ในหน้า ⚙ ก่อน'); return; }
  DB.activeTrip = code; DB.sync[code] = 0;
  await saveMeta(); closeModal(); render();
  try{
    await syncNow(false);
    if(!trip()){ toast('ไม่พบทริปรหัสนี้ ลองตรวจตัวอักษรอีกครั้ง'); DB.activeTrip=null; await saveMeta(); render(); }
    else { tab='list'; render(); toast('เข้าร่วมทริป ' + trip().name + ' แล้ว'); }
  }catch(e){ toast('เข้าร่วมไม่สำเร็จ: ' + e.message); }
}
async function pickTrip(id){ DB.activeTrip=id; await saveMeta(); closeModal(); render(); syncNow(true); }

async function openGroup(gid){
  const g = DB.groups.find(x=>x.id===gid); if(!g) return;

  const buys = s.es.map(e=>{
    const d=new Date(e.createdAt);
    return `<div class="buyrow"><div>
        <div>${money(e.cost)} × ${e.qty} = <b>${money(e.total)}</b></div>
        <div class="who">${d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}${e.by?' · '+esc(e.by):''}</div>
      </div><div style="display:flex;gap:6px">
        <button class="pill" onclick="openEntry('${e.id}')">แก้ไข</button></div></div>`;
  }).join('');

  shell(`<h3>รายละเอียดสินค้า</h3><p class="sub">${s.qty} ชิ้น · เฉลี่ย ${money(s.avg)}/ชิ้น · รวม ${money(s.sum)}</p>
    <img id="gimg" src="${thumbOf(g)}" style="width:100%;max-height:34vh;object-fit:contain;background:#EDEFE8;border-radius:12px;filter:blur(1px)" alt="">
    <div class="field"><label>ชื่อสินค้า</label>
      <input class="tin" id="gn" value="${esc(groupName(g))}" placeholder="พิมพ์ชื่อสินค้า"></div>
    ${ai?`<div class="hint" style="text-align:left">AI อ่านได้: ${esc([ai.ai.brand,ai.ai.name_en,ai.ai.name_ja,ai.ai.variant,ai.ai.size].filter(Boolean).join(' · ')||'—')}${ai.ai.confidence?` · ความมั่นใจ ${Math.round(ai.ai.confidence*100)}%`:''}</div>`:''}
    <div class="sectionhead"><h2>การซื้อ ${s.buys} ครั้ง</h2></div>${buys}
    ${others.length?`<div class="field"><label>รวมกับรายการอื่น</label>
      <select class="tin" id="mg"><option value="">— เลือกรายการที่จะรวมเข้ามา —</option>
      ${others.map(o=>`<option value="${o.id}">${esc(groupName(o)||'ยังไม่มีชื่อ')} · ${groupStats(o).qty} ชิ้น</option>`).join('')}</select>
      <button class="ghost" style="background:#fff;border:1px solid var(--line);color:var(--ink);margin-top:8px"
        onclick="doMergeSelect('${gid}')">รวมเข้ารายการนี้</button></div>`:''}
    <button class="go" onclick="saveGroupName('${gid}')">บันทึกชื่อ</button>
    <button class="ghost danger" onclick="confirmDeleteGroup('${gid}')">ลบสินค้านี้ทั้งหมด</button>
    <button class="ghost" onclick="closeModal()">ปิด</button>`);
  const full = await getPhoto((s.es[0]||{}).id);
  const el = document.getElementById('gimg');
  if(full && el){ el.src = full; el.style.filter='none'; }
}
async function saveGroupName(gid){
  const g=DB.groups.find(x=>x.id===gid);
  g.name = document.getElementById('gn').value.trim(); touch(g);
  await saveMeta(); closeModal(); render(); syncNow(true); toast('บันทึกชื่อแล้ว');
}
function confirmDeleteGroup(gid){
  const g=DB.groups.find(x=>x.id===gid); const s=groupStats(g);
  shell(`<h3>ลบสินค้านี้</h3><p class="sub">จะลบการซื้อทั้ง ${s.buys} ครั้ง รวม ${s.qty} ชิ้น ออกจากทุกเครื่องที่ใช้ทริปนี้</p>

}
async function doMergeSelect(gid){
  const v=document.getElementById('mg').value; if(!v) return;
  closeModal(); await mergeGroups(gid,v);
}
function openEntry(id){
  const e = DB.entries.find(x=>x.id===id); if(!e) return;

  shell(`<h3>แก้ไขการซื้อ</h3><p class="sub">${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}${e.by?' · บันทึกโดย '+esc(e.by):''}</p>

async function submitEntry(id){

  await updateEntry(id,c,q); closeModal();
}

    ${trip()?`<div class="field"><label>รหัสทริปนี้ (ให้เครื่องอื่นใช้เข้าร่วม)</label><div class="code">${esc(trip().id)}</div></div>`:''}
    <div class="field"><label>ที่อยู่เซิร์ฟเวอร์</label>
      <input class="tin" id="sv" value="${esc(DB.server)}" placeholder="https://xxx.workers.dev"></div>
    <div class="field"><label>รหัสผ่านเซิร์ฟเวอร์</label>
      <input class="tin" id="tk" value="${esc(DB.token)}" placeholder="ตั้งไว้ใน APP_TOKEN"></div>

      <input class="tin" id="dn" value="${esc(DB.deviceName)}" placeholder="เช่น มือถือพี่หนู"></div>

    <div class="field"><label>สำรองข้อมูล</label>
      <div class="two">
        <button class="pill" style="padding:14px" onclick="backupJSON()">ดาวน์โหลดไฟล์สำรอง</button>
        <button class="pill" style="padding:14px" onclick="document.getElementById('restoreFile').click()">กู้คืนจากไฟล์</button></div>
      <div class="hint" style="text-align:left">ไฟล์ .json มีทั้งรายการและรูปทุกใบ กู้คืนแบบรวมกับของเดิม ไม่เขียนทับ</div></div>
    <button class="ghost" onclick="closeModal()">ปิด</button>`);

async function saveSettings(){
  DB.server = document.getElementById('sv').value.trim().replace(/\/$/,'');
  DB.token  = document.getElementById('tk').value.trim();
  DB.deviceName = document.getElementById('dn').value.trim() || DB.deviceName;
  DB.useAI  = document.getElementById('useAI').checked;
  DB.entries.forEach(e=>{ if(e.ai && e.ai.status==='error') e.ai.status='queued'; });
  await saveMeta(); closeModal(); render(); toast('บันทึกการตั้งค่าแล้ว');
  queueAI(); syncNow(false);
}
document.getElementById('gearBtn').onclick = openSettings;

/* ---------- สำรอง / กู้คืน ---------- */
function download(name, blob){
  const u=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=u; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(u); },1000);
}
async function backupJSON(){
  const ids = DB.entries.filter(e=>!e.deleted).map(e=>e.id);
  const photos={}; for(const id of ids){ const p=await getPhoto(id); if(p) photos[id]=p; }
  download(`SURU_backup_${(trip()?.name||'all').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`,
    new Blob([JSON.stringify({app:'SURU', v:2, savedAt:new Date().toISOString(), db:DB, photos})],{type:'application/json'}));
  toast('สำรองข้อมูลแล้ว');
}
async function restoreJSON(file){
  try{
    const j = JSON.parse(await file.text());
    if(!j.db) throw new Error('รูปแบบไฟล์ไม่ถูกต้อง');
    let added=0;
    for(const key of ['trips','groups','entries']){
      (j.db[key]||[]).forEach(inc=>{
        const i = DB[key].findIndex(x=>x.id===inc.id);
        if(i<0){ DB[key].push(inc); added++; }
        else if((inc.updated||0) > (DB[key][i].updated||0)) DB[key][i]=inc;
      });
    }
    for(const [id,data] of Object.entries(j.photos||{})) await putPhoto(id,data);
    if(!trip() && j.db.activeTrip) DB.activeTrip = j.db.activeTrip;
    await saveMeta(); closeModal(); render(); syncNow(true);
    toast(`กู้คืนแล้ว เพิ่มใหม่ ${added} รายการ`);
  }catch(e){ toast('กู้คืนไม่สำเร็จ: ' + e.message); }
}
document.getElementById('restoreFile').addEventListener('change', ev=>{
  const f=ev.target.files[0]; ev.target.value=''; if(f) restoreJSON(f);
});

/* =========================================================
   PDF
   ========================================================= */
function head(title, sub, page, pages){
  const t=trip(), d=new Date();
  return `<div class="ph"><div><div class="t">${esc(title)}</div>
    <div style="font-size:12px;margin-top:2px">ทริป: ${esc(t.name)} · รหัส ${esc(t.id)} · สกุลเงิน ${t.currency}</div></div>
    <div class="m">${esc(sub)}<br>พิมพ์ ${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}<br>หน้า ${page} / ${pages}</div></div>`;
}
const chunkArr=(a,n)=>{ const o=[]; for(let i=0;i<a.length;i+=n) o.push(a.slice(i,i+n)); return o; };
const pic = id => PCACHE[id] || '';

function buildSummary(){
  const gs=tGroups().map(g=>({g,s:groupStats(g)}));
  const pages=chunkArr(gs,6);
  const totalQty=gs.reduce((a,x)=>a+x.s.qty,0);
  let n=0;
  return pages.map((pg,pi)=>{
    const rows=pg.map(({g,s})=>{
      n++; const nm=groupName(g), sub=groupSub(g);
      return `<tr><td>${n}</td><td><img src="${pic((s.es[0]||{}).id)||thumbOf(g)}"></td>
        <td class="l"><div class="nm">${esc(nm||'')}</div>${sub?`<div class="sm">${esc(sub)}</div>`:''}
          ${nm?'':'<div class="sm">______________________________</div>'}</td>
        <td><div class="q">${s.qty}</div></td><td><div class="chk"></div></td><td></td><td></td><td></td></tr>`;
    }).join('');
    return `<div class="page">${head('ใบตรวจรับสินค้า','รวมสินค้าชนิดเดียวกัน',pi+1,pages.length)}
      <table class="pt"><colgroup><col style="width:30px"><col style="width:96px"><col><col style="width:62px">
        <col style="width:48px"><col style="width:70px"><col style="width:70px"><col style="width:110px"></colgroup>
        <tr><th>#</th><th>รูป</th><th>ชื่อสินค้า</th><th>สั่ง</th><th>ครบ</th><th>รับจริง</th><th>ขาด/เกิน</th><th>หมายเหตุ</th></tr>
        ${rows}</table>
      <div class="pf"><span>ชนิดสินค้า ${gs.length} รายการ · รวม ${totalQty} ชิ้น</span><span>SURU Quick Purchase List</span></div>
      ${pi===pages.length-1?'<div class="sig"><div>ผู้ตรวจรับ</div><div>วันที่ตรวจรับ</div><div>ผู้อนุมัติ</div></div>':''}</div>`;
  }).join('');
}
function buildDetail(){
  const es=tEntries().slice().sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
  const pages=chunkArr(es,8);
  const sum=es.reduce((a,e)=>a+e.total,0), qty=es.reduce((a,e)=>a+e.qty,0);
  let n=0;
  return pages.map((pg,pi)=>{
    const rows=pg.map(e=>{
      n++; const g=DB.groups.find(x=>x.id===e.groupId); const d=new Date(e.createdAt);
      return `<tr><td>${n}</td><td><img src="${pic(e.id)||e.thumb}" style="height:62px"></td>
        <td class="l"><div class="nm">${esc(g?groupName(g):'')||'&nbsp;'}</div>
          <div class="sm">${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}${e.by?' · '+esc(e.by):''}</div></td>
        <td>${money(e.cost)}</td><td><b style="font-size:18px">${e.qty}</b></td>
        <td>${money(e.total)}</td><td>${'฿'+fmt(e.total*e.rate)}</td><td></td></tr>`;
    }).join('');
    return `<div class="page">${head('รายละเอียดการซื้อ','ทุกครั้งที่บันทึก',pi+1,pages.length)}
      <table class="pt"><colgroup><col style="width:30px"><col style="width:80px"><col><col style="width:72px">
        <col style="width:46px"><col style="width:80px"><col style="width:80px"><col style="width:96px"></colgroup>
        <tr><th>#</th><th>รูป</th><th>ชื่อสินค้า / วันเวลา</th><th>ต้นทุน/ชิ้น</th><th>จำนวน</th><th>ยอดรวม</th><th>≈ บาท</th><th>หมายเหตุ</th></tr>
        ${rows}</table>
      <div class="pf"><span>${es.length} ครั้ง · ${qty} ชิ้น · รวม ${money(sum)} (≈ ฿${fmt(sum*trip().rate)})</span><span>SURU Quick Purchase List</span></div>
      ${pi===pages.length-1?'<div class="sig"><div>ผู้บันทึก</div><div>ผู้ตรวจสอบ</div></div>':''}</div>`;
  }).join('');
}
async function makePDF(kind, btn){
  const label=btn.textContent; btn.disabled=true;
  btn.textContent='กำลังเตรียมรูป…';
  const ids = kind==='summary'
    ? tGroups().map(g=>(groupStats(g).es[0]||{}).id).filter(Boolean)
    : tEntries().map(e=>e.id);
  const missing = await pullPhotos(ids);
  if(missing) toast(`ขาดรูป ${missing} ใบ จะใช้รูปย่อแทน`);
  btn.textContent='กำลังสร้าง PDF…';
  const stage=document.getElementById('stage');
  stage.innerHTML = kind==='summary' ? buildSummary() : buildDetail();
  await new Promise(r=>setTimeout(r,150));
  try{
    if(!window.html2canvas||!window.jspdf) throw new Error('lib');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:'mm', format:'a4'});
    const pages=[...stage.querySelectorAll('.page')];
    for(let i=0;i<pages.length;i++){
      const cv = await html2canvas(pages[i],{scale:2, backgroundColor:'#ffffff', useCORS:true});
      if(i) pdf.addPage();
      pdf.addImage(cv.toDataURL('image/jpeg',.88),'JPEG',0,0,210,Math.min(297,cv.height*210/cv.width));
    }
    pdf.save(`SURU_${trip().name.replace(/\s+/g,'_')}_${kind==='summary'?'ตรวจรับ':'รายละเอียด'}_${new Date().toISOString().slice(0,10)}.pdf`);
    toast('สร้าง PDF แล้ว');
  }catch(e){
    const w=window.open('','_blank');
    if(w){
      w.document.write('<meta charset="utf-8"><title>SURU</title><style>'+document.querySelector('style').textContent+
        '#stage{position:static;left:0;width:auto}.page{margin:0 auto 10px;box-shadow:0 0 6px #999}'+
        '@media print{.page{box-shadow:none;page-break-after:always}}</style><div id="stage">'+stage.innerHTML+'</div>');
      w.document.close(); setTimeout(()=>w.print(),400);
      toast('เปิดหน้าปริ้นแล้ว เลือก “บันทึกเป็น PDF”');
    } else toast('สร้าง PDF ไม่สำเร็จ ลองอีกครั้ง');
  }
  stage.innerHTML=''; btn.textContent=label; btn.disabled=false;
}

boot();
